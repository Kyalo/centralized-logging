services:

  fluent-bit:
    image: fluent/fluent-bit:latest
    container_name: fluent-bit
    command: -c /fluent-bit/etc/fluent-bit.yaml
    volumes:
      - /tmp/appium-logs:/tmp/appium-logs
      - ./fluent-bit.yaml:/fluent-bit/etc/fluent-bit.yaml
    depends_on:
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      # Single bind mount - auto-creates with Loki user permissions (10001:10001)
      - loki-data:/loki  # Single volume for all paths: wal, index, cache, chunks, compactor
      - ./loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  loki-data:
    driver: local
    driver_opts:
      type: none
      o: bind,uid=10001,gid=10001
      device: ${PWD}/loki-data